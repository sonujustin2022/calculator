<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- css -->
    <link rel="stylesheet" href="./box.css" />
    <title>calculator</title>
  </head>
  <body>
    <div style="  height: 100vh;  display: flex; justify-content: center;align-items: center;">
      <div id="calcBody" style="border: none ; border-radius: 20px;   box-shadow: 0 0 20px gray;" >
        <div id="upperArea" >
            <input style="margin-left: 20px; margin-top: 20px; padding:20px 50px; border: none; border-radius: 10px;" type="text" name="" id="">
        </div>
        <div id="keysSection" style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin: 10px;">
            <button class="btn">7</button>
             <button class="btn">8</button>
             <button class="btn">9</button>
             <button class="btn-calc">*</button>
             <button class="btn">4</button>
             <button class="btn">5</button>
             <button class="btn">6</button>
             <button class="btn-calc">+</button>
              <button class="btn">1</button>
             <button class="btn">2</button>
             <button class="btn">3</button>
             <button class="btn-calc">=</button>
             <button class="btn-calc">/</button>
             <button class="btn-calc">-</button>
             <button class="btn-clear">AC</button>
               <button class="btn-clear">CE</button>
        </div>
      </div>
    </div>
  </body>
</html>
